<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Vikanra Search Engine</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #0b290b; /* ஹேக்கர் பச்சை நிற பின்னணி */
            color: #ff3333; /* சிவப்பு நிற எழுத்துக்கள் */
            padding-top: 30px;
        }

        /* போலி ஹேக்கிங் விவரங்கள் */
        .hacker-header {
            width: 90%;
            max-width: 800px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* விகான்ரா லோகோ அமைப்பு */
        .logo {
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-align: center;
        }
        .v_g { color: #4285F4; }
        .v_r { color: #EA4335; }
        .v_y { color: #FBBC05; }
        .v_b { color: #34A853; }

        /* ACCESS GRANTED பச்சை நிறப் பெட்டி */
        .access-box {
            background-color: #4cd964;
            color: #000000;
            padding: 10px 30px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0px 0px 15px #4cd964;
            margin-bottom: 30px;
        }

        /* கூகுள் அதிகாரப்பூர்வ சர்ச் பாக்ஸ் பெட்டி */
        .search-container {
            width: 90%;
            max-width: 600px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #4cd964;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(76, 217, 100, 0.6);
        }
    </style>
</head>
<body>

    <div class="hacker-header">
        twostetstepauthcommand.bui<br>
        Username: ag54348<br>
        Password: *********************<br>
        ACCESS TO SYSTEM... Initializing...<br>
        struedit.bui -r -s -unauth | syslog = false;<br>
        struct groupinfo initgroups = .usage = ATOMIC_INIT(2);
    </div>

    <div class="access-box">
        ACCESS GRANTED
    </div>

    <div class="logo">
        <span class="v_g">V</span><span class="v_r">i</span><span class="v_y">k</span><span class="v_g">a</span><span class="v_b">n</span><span class="v_r">r</span><span class="v_y">a</span>
    </div>
    <p style="color: #fff; margin-top: 0; margin-bottom: 25px; font-size: 14px; letter-spacing: 1px;">THE SMART SEARCH ENGINE</p>

    <div class="search-container">
        <script async src="https://cse.google.com/cse.js?cx=26366b925ee9747a9"></script>
        <div class="gcse-search"></div>
    </div>

</body>
</html>
